services:
  db:
    image: postgres:16-alpine
    container_name: vibe_db
    environment:
      POSTGRES_DB: myapp
      POSTGRES_USER: myapp
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myapp -d myapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: vibe_backend
    environment:
      APP_NAME: myapp
      APP_ENV: local
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://myapp:changeme@db:5432/myapp
      DATABASE_TEST_URL: postgresql+asyncpg://myapp:changeme@db:5432/myapp_test
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: vibe_frontend
    environment:
      NEXT_PUBLIC_BACKEND_BASE_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_started
    command: >
      sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm dev -H 0.0.0.0 -p 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  frontend_node_modules:
